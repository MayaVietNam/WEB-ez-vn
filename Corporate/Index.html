<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đơn Đăng Ký Thuê Thiết Bị WIFI - Doanh Nghiệp</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/choices.js/public/assets/styles/choices.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/choices.js/public/assets/scripts/choices.min.js"></script>
    
    <script src="./price-table.js"></script> 
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; min-height: 100vh; }
        body { background: linear-gradient(135deg, #f8fafc 0%, #e8f1f8 100%); font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .bg-logo-bg { pointer-events: none; position: fixed; z-index: -1; left: 0; top: 0; width: 100vw; height: 100vh; overflow: hidden; }
        .bg-logo-bg-inner { position: absolute; left: 50%; top: 50%; width: 200vw; height: 200vh; transform: translate(-50%, -50%) rotate(-10deg); background-image: url('https://i.postimg.cc/yd4v4YHG/EZ-LOGO-31.png'); background-repeat: repeat; background-size: 120px auto; opacity: 0.03; }
        .logo-on-top { display: flex; justify-content: center; position: relative; z-index: 2; padding: 2rem 0 1rem 0; }
        .logo-on-top img { height: 60px; width: auto; opacity: 0.92; }
        .form-container { background: #ffffff; border-radius: 16px; box-shadow: 0 8px 32px rgba(51, 102, 153, 0.1); border: 1px solid #d9e8f5; padding: 2.5rem; position: relative; z-index: 3; }
        .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; padding-bottom: 1rem; border-bottom: 2px solid #e0e4f8; }
        .lang-switcher { display: flex; gap: 0.5rem; }
        .lang-btn { padding: 0.5rem 1rem; border: 2px solid #cbd5e0; background: #f9fafb; border-radius: 6px; cursor: pointer; font-weight: 600; transition: all 0.3s ease; color: #2d3748; }
        .lang-btn.active { background: linear-gradient(135deg, #3182ce 0%, #2c5282 100%); color: white; border-color: #3182ce; }
        .section-title { font-size: 1.35rem; font-weight: 700; color: #1a365d; margin-bottom: 1.5rem; padding-bottom: 1rem; border-bottom: 2.5px solid #3182ce; display: flex; align-items: center; gap: 0.75rem; }
        .section-icon { width: 38px; height: 38px; background: linear-gradient(135deg, #3182ce 0%, #2c5282 100%); border-radius: 10px; display: flex; align-items: center; justify-content: center; color: white; font-size: 1.25rem; }
        .form-group label { display: block; color: #2d3748; font-size: 0.95rem; font-weight: 600; margin-bottom: 0.5rem; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 0.8rem 1rem; border: 1.5px solid #cbd5e0; border-radius: 8px; font-size: 0.95rem; color: #2d3748; background: #f9fafb; transition: all 0.3s ease; font-family: 'Inter', sans-serif; }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus { outline: none; border-color: #3182ce; background: #ffffff; box-shadow: 0 0 0 3px rgba(49, 130, 206, 0.08); }
        .form-group textarea { resize: vertical; min-height: 80px; }
        .rental-request { background: linear-gradient(135deg, #f7fafc 0%, #edf2f7 100%); padding: 1.5rem; border-radius: 12px; border: 1.5px solid #cbd5e0; margin-bottom: 1.5rem; transition: all 0.3s ease; }
        .rental-request:hover { border-color: #a0aec0; box-shadow: 0 4px 16px rgba(49, 130, 206, 0.06); }
        .request-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.25rem; padding-bottom: 0.75rem; border-bottom: 1.5px solid #cbd5e0; }
        .request-title { font-size: 1.05rem; font-weight: 700; color: #1a365d; }
        .remove-request-btn { background: #fed7d7; color: #c53030; border: none; padding: 0.5rem 1rem; border-radius: 6px; font-weight: 600; cursor: pointer; font-size: 0.85rem; }
        #add-request-btn { background: linear-gradient(135deg, #3182ce 0%, #2c5282 100%); color: white; padding: 0.8rem 1.75rem; box-shadow: 0 4px 12px rgba(49, 130, 206, 0.25); border: none; font-weight: 600; border-radius: 8px; cursor: pointer; transition: all 0.3s ease; }
        #submit-form-btn { background: linear-gradient(135deg, #ed8936 0%, #dd6b20 100%); color: #ffffff; padding: 0.9rem 2rem; font-size: 1.05rem; box-shadow: 0 4px 12px rgba(237, 137, 54, 0.25); min-width: 180px; border: none; font-weight: 600; border-radius: 8px; cursor: pointer; transition: all 0.3s ease; }
        .footer-company-info { font-size: 0.9rem; background: linear-gradient(135deg, #f9fafb 0%, #edf2f7 100%); color: #2d3748; border-radius: 12px; box-shadow: 0 4px 12px rgba(51, 102, 153, 0.1); padding: 1.5rem 2rem; margin: 2.5rem auto 1.5rem auto; text-align: center; max-width: 700px; border-top: 3px solid #3182ce; position: relative; z-index: 3; }
        .loading-overlay, .success-screen { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0, 0, 0, 0.3); backdrop-filter: blur(4px); z-index: 9999; justify-content: center; align-items: center; }
        .loading-overlay.active, .success-screen.active { display: flex; }
        .loading-box, .success-box { background: white; border-radius: 20px; padding: 3rem 2rem; text-align: center; box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3); animation: slideUp 0.4s ease; }
        .spinner { width: 50px; height: 50px; margin: 0 auto 1.5rem; border: 4px solid #e0e4f8; border-top: 4px solid #3182ce; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        
        /* STYLE CHO KHUYẾN MÃI DOANH NGHIỆP */
        .discount-badge { background: linear-gradient(135deg, #f0fdf4 0%, #e0f5e4 100%); color: #059669; padding: 0.8rem 1.25rem; border-radius: 8px; font-weight: 600; margin-top: 1rem; display: block; border: 1px solid #d1fae5; font-size: 0.95rem; text-align: center;}
        .price-preview-box { background-color: #ebf8ff; border: 1px dashed #3182ce; border-radius: 8px; padding: 12px; margin-top: 15px; text-align: right; font-size: 0.95rem; display: none; }
        .price-preview-box.active { display: block; }
        .price-amount { color: #c53030; font-weight: 700; font-size: 1.1rem; }
        .original-price { text-decoration: line-through; color: #718096; font-size: 0.85rem; margin-right: 8px;}
    </style>
</head>
<body>
    <div class="bg-logo-bg"><div class="bg-logo-bg-inner"></div></div>
    <div class="logo-on-top"><img src="https://i.postimg.cc/VvSyGkBV/EZ-LOGO-08.png" alt="Logo"></div>
    
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-box">
            <div class="spinner"></div>
            <div class="loading-text" id="loadingText" data-trans="loadingText">Đang xử lý yêu cầu...</div>
            <div class="loading-subtext" id="loadingSubtext" data-trans="loadingSubtext">Vui lòng chờ</div>
        </div>
    </div>
    
    <div class="success-screen" id="successScreen">
        <div class="success-box">
            <div style="font-size: 3rem; color: #10b981; margin-bottom: 1rem;">✓</div>
            <h2 id="successTitle" data-trans="successTitle" style="font-size: 1.5rem; color: #10b981; font-weight: bold;">Thành Công!</h2>
            <p id="successMessage" data-trans="successMessage" style="margin: 1rem 0; color: #4a5568;">Yêu cầu của bạn đã được gửi thành công.</p>
            <div style="background: #f0fdf4; border: 2px solid #d1fae5; border-radius: 10px; padding: 1rem; margin-bottom: 1.5rem; font-size: 0.85rem;">
                <div style="color: #6b7280; font-size: 0.8rem; margin-bottom: 0.5rem;" data-trans="codeLabel">Mã Tham Chiếu:</div>
                <div id="codeValue" style="font-weight: 700; color: #059669; font-family: 'Courier New', monospace; font-size: 1rem;"></div>
            </div>
            <button id="successBtn" data-trans="successBtnText" onclick="location.reload()" style="background: #3182ce; color: white; padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold;">Tạo Đơn Mới</button>
        </div>
    </div>
    
    <main class="px-4 sm:px-6 py-4 sm:py-6">
        <div class="form-container max-w-4xl mx-auto">
            <div class="header-top">
                <h1 class="text-2xl sm:text-3xl font-extrabold text-blue-900" id="mainTitle" data-trans="mainTitle">
                    Đơn Đăng Ký Thuê Thiết Bị WIFI (Doanh Nghiệp)
                </h1>
                <div class="lang-switcher">
                    <button type="button" class="lang-btn active" data-lang="vi">Tiếng Việt</button>
                    <button type="button" class="lang-btn" data-lang="en">English</button>
                </div>
            </div>
            
            <form id="wifi-form">
                <div class="mb-8">
                    <div class="section-title"><div class="section-icon">👤</div><div id="sectionSender" data-trans="sectionSender">Thông tin người gửi</div></div>
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
                        <div class="form-group"><label data-trans="labelName">Họ và tên</label><input type="text" id="sender-name" required></div>
                        <div class="form-group"><label data-trans="labelEmail">Email</label><input type="email" id="sender-email" required></div>
                        <div class="form-group"><label data-trans="labelPhone">Số điện thoại</label><input type="tel" id="sender-phone" required></div>
                        <div class="form-group"><label data-trans="labelCompany">Công ty</label><input type="text" id="sender-company" required></div>
                        <div class="form-group">
                            <label data-trans="labelRegion">Khu vực</label>
                            <select id="sender-region" required><option value="" data-trans="selectRegion">-- Chọn --</option><option value="HN">HN</option><option value="HCM">HCM</option></select>
                        </div>
                        <div class="form-group"><label data-trans="labelTaxCode">Mã số thuế</label><input type="text" id="sender-taxcode" required></div>
                    </div>
                    
                    <div id="discountNotice" style="display:none;">
                        <div class="discount-badge" id="discountBadge"></div>
                    </div>
                </div>

                <div class="mb-8">
                    <div class="section-title"><div class="section-icon">📋</div><div id="sectionRental" data-trans="sectionRental">Chi tiết đơn thuê</div></div>
                    <div id="rental-requests-container" class="space-y-6 mb-8"></div>
                    <div class="flex justify-center"><button type="button" id="add-request-btn" data-trans="addRequest">➕ Thêm đơn mới</button></div>
                </div>

                <div class="mb-8">
                    <div class="section-title"><div class="section-icon">🚚</div><div id="sectionShipping" data-trans="sectionShipping">Thông tin vận chuyển</div></div>
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
                        <div class="form-group"><label data-trans="labelShippingName">Tên người nhận</label><input type="text" id="shipping-name" required></div>
                        <div class="form-group"><label data-trans="labelShippingPhone">SĐT người nhận</label><input type="tel" id="shipping-phone" required></div>
                        <div class="form-group sm:col-span-2"><label data-trans="labelShippingAddress">Địa chỉ giao hàng</label><textarea id="shipping-address" required></textarea></div>
                        <div class="form-group"><label data-trans="labelShippingDate">Ngày giao hàng</label><input type="date" id="shipping-date" required></div>
                        <div class="form-group">
                            <label data-trans="labelShippingMethod">Phương thức vận chuyển</label>
                            <select id="shipping-method" required>
                                <option value="" data-trans="selectShipping">-- Chọn phương thức --</option>
                                <option value="Tiêu chuẩn" data-trans="shipStandard">Tiêu chuẩn (3-5 ngày)</option>
                                <option value="Chuyển phát nhanh" data-trans="shipExpress">Chuyển phát nhanh (1-2 ngày)</option>
                                <option value="Hỏa tốc" data-trans="shipUrgent">Hỏa tốc</option>
                                <option value="Tự lấy" data-trans="shipPickup">Tự lấy</option>
                            </select>
                        </div>
                    </div>
                </div>
                
                <div class="flex justify-center"><button type="submit" id="submit-form-btn" data-trans="submit">🚀 Gửi Yêu Cầu</button></div>
            </form>
        </div>
    </main>
    
    <footer>
        <div class="footer-company-info">
            <h2 id="footerTitle" data-trans="footerTitle">Công Ty TNHH Maya Vietnam</h2>
            <div id="footerSubtitle" data-trans="footerSubtitle" style="color: #3182ce; font-weight: 600; margin-bottom: 1rem;">MAYA VIETNAM CO., LTD</div>
            <div style="margin-top: 1rem; line-height: 1.8;">
                <div id="footerAddress"></div>
                <div id="footerHotline" style="margin-top: 0.8rem;"></div>
            </div>
        </div>
    </footer>

    <script>
        // ===== CẤU HÌNH =====
        const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzr2if7QLKh5ApiCzFUR9_4wvNa7qXvbzceSLGlVg4R99tYMmGT1HSEoRp8vsICc4xl/exec";
        const UNIT_NAME = "CorporateOrders"; 
        let requestCount = 0;
        let currentLang = 'vi';
        let corporateDiscountRate = 0; // Biến lưu % giảm giá

        const translations = {
            vi: {
                mainTitle: "Đơn Đăng Ký Thuê Thiết Bị WIFI (Chiết Khấu Doanh Nghiệp)",
                sectionSender: "Thông tin người gửi", sectionRental: "Chi tiết đơn thuê", sectionShipping: "Thông tin vận chuyển",
                labelName: "Họ và tên", labelEmail: "Email", labelPhone: "Số điện thoại", labelCompany: "Công ty", labelRegion: "Khu vực", labelTaxCode: "Mã số thuế",
                labelShippingName: "Tên người nhận", labelShippingPhone: "SĐT người nhận", labelShippingAddress: "Địa chỉ", labelShippingDate: "Ngày nhận", labelShippingMethod: "Cách giao hàng",
                selectRegion: "-- Chọn --", selectShipping: "-- Chọn --",
                shipStandard: "Tiêu chuẩn (3-5 ngày)", shipExpress: "Chuyển phát nhanh (1-2 ngày)", shipUrgent: "Hỏa tốc", shipPickup: "Tự lấy",
                addRequest: "➕ Thêm đơn mới", submit: "🚀 Gửi Yêu Cầu", loadingText: "Đang xử lý...", loadingSubtext: "Vui lòng chờ",
                successTitle: "Thành Công!", successMessage: "Đã gửi thành công.", codeLabel: "Mã Tham Chiếu:", successBtnText: "Tạo Đơn Mới",
                footerTitle: "Công Ty TNHH Maya Vietnam", footerSubtitle: "MAYA VIETNAM CO., LTD",
                reqTitle: "Đơn", fromDate: "Từ ngày", toDate: "Đến ngày", days: "Số ngày", quantity: "Số lượng máy", country: "Quốc gia", package: "Gói dữ liệu", budgetCode: "Budget Code",
                selectCountry: "-- Chọn quốc gia --", selectPackage: "-- Chọn gói --", removeBtn: "Xóa",
                pricePreview: "Tạm tính (Đã áp dụng giảm giá & VAT): ",
                discountApplied: "Chiết khấu doanh nghiệp được áp dụng",
                footerAddressHTML: "<strong>Địa chỉ:</strong> Phòng 1630, Tầng 16, DAEHA BUSINESS CENTER, 360 Kim Mã, Giảng Võ, Hà Nội",
                footerHotlineHTML: "<strong>Hotline:</strong> <span style='color:#1a365d; font-weight:bold;'>0962 000 650</span> (Tiếng Việt) | <span style='color:#ed8936; font-weight:bold;'>0365 399 288</span> (Tiếng Nhật)"
            },
            en: {
                mainTitle: "WIFI Device Rental (Corporate Discount)",
                sectionSender: "Sender Info", sectionRental: "Rental Details", sectionShipping: "Shipping Info",
                labelName: "Full Name", labelEmail: "Email", labelPhone: "Phone", labelCompany: "Company", labelRegion: "Region", labelTaxCode: "Tax Code",
                labelShippingName: "Recipient Name", labelShippingPhone: "Recipient Phone", labelShippingAddress: "Address", labelShippingDate: "Delivery Date", labelShippingMethod: "Shipping Method",
                selectRegion: "-- Select --", selectShipping: "-- Select --",
                shipStandard: "Standard (3-5 days)", shipExpress: "Express (1-2 days)", shipUrgent: "Urgent", shipPickup: "Pick Up",
                addRequest: "➕ Add Request", submit: "🚀 Submit", loadingText: "Processing...", loadingSubtext: "Please wait",
                successTitle: "Success!", successMessage: "Sent successfully.", codeLabel: "Ref Code:", successBtnText: "New Request",
                footerTitle: "MAYA VIETNAM CO., LTD", footerSubtitle: "MAYA VIETNAM CO., LTD",
                reqTitle: "Request", fromDate: "From", toDate: "To", days: "Days", quantity: "Quantity", country: "Country", package: "Package", budgetCode: "Budget Code",
                selectCountry: "-- Select --", selectPackage: "-- Select --", removeBtn: "Remove",
                pricePreview: "Est. Total (Inc. Discount & VAT): ",
                discountApplied: "Corporate discount applied",
                footerAddressHTML: "<strong>Address:</strong> Room 1630, 16th Fl, DAEHA BUSINESS CENTER, Hanoi",
                footerHotlineHTML: "<strong>Hotline:</strong> <span style='color:#1a365d; font-weight:bold;'>0962 000 650</span> (Vietnamese) | <span style='color:#ed8936; font-weight:bold;'>0365 399 288</span> (Japanese)"
            }
        };

        function formatMoney(amount) {
            return new Intl.NumberFormat('vi-VN', { style: 'currency', currency: 'VND' }).format(amount);
        }

        // TẢI BẢNG GIẢM GIÁ TỪ GOOGLE SCRIPT MỘT LẦN KHI MỞ TRANG
        async function fetchDiscounts() {
            try {
                const response = await fetch(APPS_SCRIPT_URL + '?action=getDiscounts');
                const json = await response.json();
                if (json.result === 'success') {
                    window.DISCOUNT_DATA = json.data;
                    checkDiscount(); // Kiểm tra ngay xem tax code từ login có được giảm không
                }
            } catch (e) {
                console.error("Không thể tải bảng chiết khấu.");
            }
        }

        // KIỂM TRA MST ĐỂ LẤY % GIẢM GIÁ
        function checkDiscount() {
            const taxCode = document.getElementById('sender-taxcode').value.trim();
            if (!taxCode || typeof window.DISCOUNT_DATA === 'undefined') {
                corporateDiscountRate = 0;
            } else {
                corporateDiscountRate = window.DISCOUNT_DATA[String(taxCode).trim()] || 0;
            }

            const notice = document.getElementById('discountNotice');
            const badge = document.getElementById('discountBadge');
            const t = translations[currentLang];
            
            if (corporateDiscountRate > 0) {
                notice.style.display = 'block';
                badge.textContent = `✅ ${t.discountApplied}: ${(corporateDiscountRate * 100).toFixed(0)}%`;
            } else {
                notice.style.display = 'none';
            }

            // Cập nhật lại toàn bộ giá trên màn hình
            document.querySelectorAll('.rental-request').forEach(req => updatePricePreview(req));
        }

        // TÍNH GIÁ DỰ KIẾN (Corporate)
        function updatePricePreview(reqElement) {
            const country = reqElement.querySelector('.choices-country').value;
            const pkg = reqElement.querySelector('.package-select').value;
            const days = parseInt(reqElement.querySelector('.days-input').value) || 0;
            const quantity = parseInt(reqElement.querySelector('.quantity-input').value) || 1;
            const previewBox = reqElement.querySelector('.price-preview-box');
            const amountSpan = reqElement.querySelector('.price-amount');
            const t = translations[currentLang];

            if (!country || !pkg || days <= 0 || quantity <= 0) {
                previewBox.classList.remove('active'); return;
            }

            // Lấy giá gốc từ thư viện chung (Giả sử dùng chung bảng giá với SUMI/HIS)
            let unitPrice = 0;
            if (typeof getPriceForUnit === 'function') {
                // Tìm thử trong SUMITOMO trước, nếu không có thì thôi
                unitPrice = getPriceForUnit("SUMITOMO", country, pkg); 
            }

            if (unitPrice > 0) {
                const baseTotal = unitPrice * days * quantity;
                const discountAmount = Math.round(baseTotal * corporateDiscountRate);
                const afterDiscount = baseTotal - discountAmount;
                const vat = Math.round(afterDiscount * 0.10);
                const grandTotal = afterDiscount + vat;

                let html = '';
                if (corporateDiscountRate > 0) {
                    html += `<span class="original-price">${formatMoney(baseTotal + Math.round(baseTotal*0.1))}</span>`;
                }
                html += formatMoney(grandTotal);

                amountSpan.innerHTML = html;
                previewBox.querySelector('.preview-label').textContent = t.pricePreview;
                previewBox.classList.add('active');
            } else {
                previewBox.classList.remove('active');
            }
        }

        // TẠO FORM ĐƠN MỚI
        function addRentalRequest() {
            requestCount++;
            const t = translations[currentLang];
            const container = document.getElementById('rental-requests-container');
            const div = document.createElement('div');
            div.className = 'rental-request';
            
            div.innerHTML = `
                <div class="request-header">
                    <h2 class="request-title" data-trans="reqTitle">${t.reqTitle} ${requestCount}</h2>
                    ${requestCount > 1 ? `<button type="button" class="remove-request-btn" onclick="this.closest('.rental-request').remove(); updateRequestNumbers();" data-trans="removeBtn">${t.removeBtn}</button>` : ''}
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="form-group"><label data-trans="fromDate">${t.fromDate}</label><input type="date" class="date-from" required></div>
                    <div class="form-group"><label data-trans="toDate">${t.toDate}</label><input type="date" class="date-to" required></div>
                    <div class="form-group"><label data-trans="days">${t.days}</label><input type="number" class="days-input" readonly></div>
                    <div class="form-group"><label data-trans="quantity">${t.quantity}</label><input type="number" class="quantity-input" value="1" min="1" required></div>
                    <div class="form-group">
                        <label data-trans="country">${t.country}</label>
                        <select class="choices-country" required><option value="">${t.selectCountry}</option></select>
                    </div>
                    <div class="form-group">
                        <label data-trans="package">${t.package}</label>
                        <select class="package-select" required>
                            <option value="">${t.selectPackage}</option>
                            <option value="500MB/ngày">500MB/ngày</option>
                            <option value="1GB/ngày">1GB/ngày</option>
                            <option value="5GB/ngày">5GB/ngày</option>
                        </select>
                    </div>
                    <div class="md:col-span-2 form-group"><label data-trans="budgetCode">${t.budgetCode}</label><input type="text" class="budget-code-input"></div>
                </div>
                <div class="price-preview-box">
                    <span class="preview-label">${t.pricePreview}</span><span class="price-amount">0 đ</span>
                </div>
            `;
            container.appendChild(div);

            const calculateParams = () => {
                const df = div.querySelector('.date-from').value;
                const dt = div.querySelector('.date-to').value;
                if(df && dt) {
                    const d1 = new Date(df), d2 = new Date(dt);
                    if(d1 <= d2) div.querySelector('.days-input').value = Math.ceil(Math.abs(d2 - d1) / (1000 * 60 * 60 * 24)) + 1;
                }
                updatePricePreview(div);
            };

            div.querySelector('.date-from').addEventListener('change', calculateParams);
            div.querySelector('.date-to').addEventListener('change', calculateParams);
            div.querySelector('.quantity-input').addEventListener('input', calculateParams);

            loadCountriesIntoSelect(div.querySelector('.choices-country'));
            div.querySelector('.choices-country').addEventListener('change', calculateParams);
            div.querySelector('.package-select').addEventListener('change', calculateParams);
        }

        function updateRequestNumbers() {
            const reqs = document.querySelectorAll('.rental-request');
            reqs.forEach((r, idx) => r.querySelector('.request-title').textContent = `${translations[currentLang].reqTitle} ${idx + 1}`);
            requestCount = reqs.length;
        }

        function loadCountriesIntoSelect(selectElem) {
            if (typeof PRICE_TABLE === 'undefined' || typeof PRICE_TABLE["SUMITOMO"] === 'undefined') {
                setTimeout(() => loadCountriesIntoSelect(selectElem), 100); return;
            }
            Object.keys(PRICE_TABLE["SUMITOMO"]).sort().forEach(c => {
                const opt = document.createElement('option'); opt.value = c; opt.textContent = c; selectElem.appendChild(opt);
            });
            new Choices(selectElem, { searchEnabled: true, shouldSort: false, itemSelectText: 'Chọn' });
        }

        function applyTranslations() {
            const t = translations[currentLang];
            document.querySelectorAll('[data-trans]').forEach(el => {
                const key = el.getAttribute('data-trans');
                if (t[key]) {
                    if(el.tagName === 'OPTION') el.textContent = t[key];
                    else if(el.tagName === 'INPUT') el.placeholder = t[key];
                    else el.textContent = t[key];
                }
            });
            document.getElementById('footerAddress').innerHTML = t.footerAddressHTML;
            document.getElementById('footerHotline').innerHTML = t.footerHotlineHTML;
            updateRequestNumbers();
            checkDiscount(); // Cập nhật lại text của discount badge
        }

        // ===== KHỞI TẠO =====
        document.addEventListener('DOMContentLoaded', () => {
            // Lấy MST từ trang đăng nhập nếu có
            const savedTaxCode = sessionStorage.getItem('corpTaxCode');
            if (savedTaxCode) {
                document.getElementById('sender-taxcode').value = savedTaxCode;
            }

            // Gọi API lấy bảng giảm giá
            fetchDiscounts();

            applyTranslations(); 

            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    currentLang = e.target.getAttribute('data-lang');
                    document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
                    e.target.classList.add('active');
                    applyTranslations();
                });
            });

            document.getElementById('sender-taxcode').addEventListener('input', checkDiscount);

            document.getElementById('add-request-btn').addEventListener('click', addRentalRequest);
            addRentalRequest();

            document.getElementById('wifi-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                
                const senderInfo = {
                    name: document.getElementById('sender-name').value,
                    email: document.getElementById('sender-email').value,
                    phone: document.getElementById('sender-phone').value,
                    company: document.getElementById('sender-company').value,
                    region: document.getElementById('sender-region').value,
                    taxCode: document.getElementById('sender-taxcode').value
                };

                const requests = [];
                document.querySelectorAll('.rental-request').forEach(req => {
                    requests.push({
                        fromDate: req.querySelector('.date-from').value,
                        toDate: req.querySelector('.date-to').value,
                        days: parseInt(req.querySelector('.days-input').value) || 0,
                        quantity: parseInt(req.querySelector('.quantity-input').value) || 1,
                        country: req.querySelector('.choices-country').value,
                        dataPackage: req.querySelector('.package-select').value,
                        budgetCode: req.querySelector('.budget-code-input').value,
                        unitPrice: getPriceForUnit("SUMITOMO", req.querySelector('.choices-country').value, req.querySelector('.package-select').value),
                    });
                });

                const shippingInfo = {
                    recipient: document.getElementById('shipping-name').value,
                    phone: document.getElementById('shipping-phone').value,
                    address: document.getElementById('shipping-address').value,
                    date: document.getElementById('shipping-date').value,
                    method: document.getElementById('shipping-method').value
                };

                const payload = { unit: UNIT_NAME, submissionTime: new Date().toISOString(), globalSenderInfo: senderInfo, rentalRequests: requests, shippingInfo: shippingInfo };

                document.getElementById('loadingOverlay').classList.add('active');

                try {
                    const response = await fetch(APPS_SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) });
                    const result = await response.json();
                    document.getElementById('loadingOverlay').classList.remove('active');
                    if (result.status === 'OK') {
                        document.getElementById('codeValue').textContent = '#REQ' + new Date().getTime().toString().slice(-10);
                        document.getElementById('successScreen').classList.add('active');
                    } else alert("Lỗi máy chủ: " + result.message);
                } catch (error) {
                    document.getElementById('loadingOverlay').classList.remove('active');
                    alert("Lỗi kết nối mạng: " + error.message);
                }
            });
        });
    </script>
</body>
</html>
