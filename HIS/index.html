<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đơn Đăng Ký Thuê Thiết Bị WIFI - HIS</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/choices.js/public/assets/styles/choices.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/choices.js/public/assets/scripts/choices.min.js"></script>
    
    <script src="./price-table.js"></script> 
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; min-height: 100vh; }
        body { background: linear-gradient(135deg, #f8fafc 0%, #e8f1f8 100%); font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .bg-logo-bg { pointer-events: none; position: fixed; z-index: -1; left: 0; top: 0; width: 100vw; height: 100vh; overflow: hidden; }
        .bg-logo-bg-inner { position: absolute; left: 50%; top: 50%; width: 200vw; height: 200vh; transform: translate(-50%, -50%) rotate(-10deg); background-image: url('https://i.postimg.cc/yd4v4YHG/EZ-LOGO-31.png'); background-repeat: repeat; background-size: 120px auto; opacity: 0.03; }
        .logo-on-top { display: flex; justify-content: center; position: relative; z-index: 2; padding: 2rem 0 1rem 0; }
        .logo-on-top img { height: 60px; width: auto; opacity: 0.92; }
        .form-container { background: #ffffff; border-radius: 16px; box-shadow: 0 8px 32px rgba(51, 102, 153, 0.1); border: 1px solid #d9e8f5; padding: 2.5rem; position: relative; z-index: 3; }
        .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; padding-bottom: 1rem; border-bottom: 2px solid #e0e4f8; }
        .lang-switcher { display: flex; gap: 0.5rem; }
        .lang-btn { padding: 0.5rem 1rem; border: 2px solid #cbd5e0; background: #f9fafb; border-radius: 6px; cursor: pointer; font-weight: 600; transition: all 0.3s ease; color: #2d3748; }
        .lang-btn.active { background: linear-gradient(135deg, #3182ce 0%, #2c5282 100%); color: white; border-color: #3182ce; }
        .section-title { font-size: 1.35rem; font-weight: 700; color: #1a365d; margin-bottom: 1.5rem; padding-bottom: 1rem; border-bottom: 2.5px solid #3182ce; display: flex; align-items: center; gap: 0.75rem; }
        .section-icon { width: 38px; height: 38px; background: linear-gradient(135deg, #3182ce 0%, #2c5282 100%); border-radius: 10px; display: flex; align-items: center; justify-content: center; color: white; font-size: 1.25rem; }
        .form-group label { display: block; color: #2d3748; font-size: 0.95rem; font-weight: 600; margin-bottom: 0.5rem; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 0.8rem 1rem; border: 1.5px solid #cbd5e0; border-radius: 8px; font-size: 0.95rem; color: #2d3748; background: #f9fafb; transition: all 0.3s ease; font-family: 'Inter', sans-serif; }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus { outline: none; border-color: #3182ce; background: #ffffff; box-shadow: 0 0 0 3px rgba(49, 130, 206, 0.08); }
        .form-group textarea { resize: vertical; min-height: 80px; }
        .rental-request { background: linear-gradient(135deg, #f7fafc 0%, #edf2f7 100%); padding: 1.5rem; border-radius: 12px; border: 1.5px solid #cbd5e0; margin-bottom: 1.5rem; transition: all 0.3s ease; }
        .request-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.25rem; padding-bottom: 0.75rem; border-bottom: 1.5px solid #cbd5e0; }
        .request-title { font-size: 1.05rem; font-weight: 700; color: #1a365d; }
        .remove-request-btn { background: #fed7d7; color: #c53030; border: none; padding: 0.5rem 1rem; border-radius: 6px; font-weight: 600; cursor: pointer; font-size: 0.85rem; }
        #add-request-btn { background: linear-gradient(135deg, #3182ce 0%, #2c5282 100%); color: white; padding: 0.8rem 1.75rem; box-shadow: 0 4px 12px rgba(49, 130, 206, 0.25); border: none; font-weight: 600; border-radius: 8px; cursor: pointer; transition: all 0.3s ease; }
        #submit-form-btn { background: linear-gradient(135deg, #ed8936 0%, #dd6b20 100%); color: #ffffff; padding: 0.9rem 2rem; font-size: 1.05rem; box-shadow: 0 4px 12px rgba(237, 137, 54, 0.25); min-width: 180px; border: none; font-weight: 600; border-radius: 8px; cursor: pointer; transition: all 0.3s ease; }
        .footer-company-info { font-size: 0.9rem; background: linear-gradient(135deg, #f9fafb 0%, #edf2f7 100%); color: #2d3748; border-radius: 12px; box-shadow: 0 4px 12px rgba(51, 102, 153, 0.1); padding: 1.5rem 2rem; margin: 2.5rem auto 1.5rem auto; text-align: center; max-width: 700px; border-top: 3px solid #3182ce; position: relative; z-index: 3; }
        .loading-overlay, .success-screen { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0, 0, 0, 0.3); backdrop-filter: blur(4px); z-index: 9999; justify-content: center; align-items: center; }
        .loading-overlay.active, .success-screen.active { display: flex; }
        .loading-box, .success-box { background: white; border-radius: 20px; padding: 3rem 2rem; text-align: center; box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3); animation: slideUp 0.4s ease; }
        .spinner { width: 50px; height: 50px; margin: 0 auto 1.5rem; border: 4px solid #e0e4f8; border-top: 4px solid #3182ce; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        
        /* STYLE CHO KHU VỰC HIỂN THỊ GIÁ DỰ KIẾN */
        .price-preview-box {
            background-color: #ebf8ff;
            border: 1px dashed #3182ce;
            border-radius: 8px;
            padding: 12px;
            margin-top: 15px;
            text-align: right;
            font-size: 0.95rem;
            display: none; /* Ẩn đi khi chưa có giá */
        }
        .price-preview-box.active {
            display: block;
        }
        .price-amount {
            color: #c53030;
            font-weight: 700;
            font-size: 1.1rem;
        }
    </style>
</head>
<body>
    <div class="bg-logo-bg"><div class="bg-logo-bg-inner"></div></div>
    <div class="logo-on-top"><img src="https://i.postimg.cc/VvSyGkBV/EZ-LOGO-08.png" alt="Logo"></div>
    
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-box">
            <div class="spinner"></div>
            <div class="loading-text" id="loadingText">Đang xử lý yêu cầu...</div>
            <div class="loading-subtext" id="loadingSubtext">Vui lòng chờ</div>
        </div>
    </div>
    
    <div class="success-screen" id="successScreen">
        <div class="success-box">
            <div style="font-size: 3rem; color: #10b981; margin-bottom: 1rem;">✓</div>
            <h2 id="successTitle" style="font-size: 1.5rem; color: #10b981; font-weight: bold;">Thành Công!</h2>
            <p id="successMessage" style="margin: 1rem 0; color: #4a5568;">Yêu cầu của bạn đã được gửi thành công. Chúng tôi sẽ liên hệ lại sớm.</p>
            <button id="successBtn" onclick="location.reload()" style="background: #3182ce; color: white; padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold;">Tạo Đơn Mới</button>
        </div>
    </div>
    
    <main class="px-4 sm:px-6 py-4 sm:py-6">
        <div class="form-container max-w-4xl mx-auto">
            <div class="header-top">
                <h1 class="text-2xl sm:text-3xl font-extrabold text-blue-900" id="mainTitle">
                    Đơn Đăng Ký Thuê Thiết Bị WIFI - HIS
                </h1>
                <div class="lang-switcher">
                    <button type="button" class="lang-btn active" data-lang="vi">Tiếng Việt</button>
                    <button type="button" class="lang-btn" data-lang="en">English</button>
                </div>
            </div>
            
            <form id="wifi-form">
                <div class="mb-8">
                    <div class="section-title"><div class="section-icon">👤</div><div id="sectionSender">Thông tin người gửi</div></div>
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
                        <div class="form-group"><label id="labelName">Họ và tên</label><input type="text" id="sender-name" required></div>
                        <div class="form-group"><label id="labelEmail">Email</label><input type="email" id="sender-email" required></div>
                        <div class="form-group"><label id="labelPhone">Số điện thoại</label><input type="tel" id="sender-phone" required></div>
                        <div class="form-group"><label id="labelCompany">Công ty</label><input type="text" id="sender-company" required></div>
                        <div class="form-group">
                            <label id="labelRegion">Khu vực</label>
                            <select id="sender-region" required>
                                <option value="">-- Chọn --</option><option value="HN">HN</option><option value="HCM">HCM</option>
                            </select>
                        </div>
                        <div class="form-group"><label id="labelTaxCode">Mã số thuế</label><input type="text" id="sender-taxcode"></div>
                    </div>
                </div>

                <div class="mb-8">
                    <div class="section-title"><div class="section-icon">📋</div><div id="sectionRental">Chi tiết đơn thuê</div></div>
                    
                    <div id="rental-requests-container" class="space-y-6 mb-8">
                        </div>
                    
                    <div class="flex justify-center">
                        <button type="button" id="add-request-btn">➕ Thêm đơn mới</button>
                    </div>
                </div>

                <div class="mb-8">
                    <div class="section-title"><div class="section-icon">🚚</div><div id="sectionShipping">Thông tin vận chuyển</div></div>
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
                        <div class="form-group"><label id="labelShippingName">Tên người nhận</label><input type="text" id="shipping-name" required></div>
                        <div class="form-group"><label id="labelShippingPhone">SĐT người nhận</label><input type="tel" id="shipping-phone" required></div>
                        <div class="form-group sm:col-span-2"><label id="labelShippingAddress">Địa chỉ giao hàng</label><textarea id="shipping-address" required></textarea></div>
                        <div class="form-group">
                            <label id="labelShippingMethod">Phương thức vận chuyển</label>
                            <select id="shipping-method" required>
                                <option value="">-- Chọn phương thức --</option>
                                <option value="Tiêu chuẩn">Tiêu chuẩn (3-5 ngày)</option>
                                <option value="Chuyển phát nhanh">Chuyển phát nhanh (1-2 ngày)</option>
                                <option value="Hỏa tốc">Hỏa tốc</option>
                                <option value="Tự lấy">Tự lấy</option>
                            </select>
                        </div>
                    </div>
                </div>
                
                <div class="flex justify-center"><button type="submit" id="submit-form-btn">🚀 Gửi Yêu Cầu</button></div>
            </form>
        </div>
    </main>

    <script>
        // ===== CẤU HÌNH =====
        const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzr2if7QLKh5ApiCzFUR9_4wvNa7qXvbzceSLGlVg4R99tYMmGT1HSEoRp8vsICc4xl/exec";
        const UNIT_NAME = "HIS"; // Bắt buộc phải trùng tên trong price-table.js
        let requestCount = 0;
        let currentLang = 'vi';

        // ===== NGÔN NGỮ =====
        const translations = {
            vi: {
                mainTitle: "Đơn Đăng Ký Thuê Thiết Bị WIFI - HIS",
                reqTitle: "Đơn",
                userName: "Tên người dùng",
                imei: "IMEI (Để trống hệ thống tự điền)",
                fromDate: "Từ ngày",
                toDate: "Đến ngày",
                days: "Số ngày",
                country: "Quốc gia",
                package: "Gói dữ liệu",
                selectCountry: "-- Chọn quốc gia --",
                selectPackage: "-- Chọn gói --",
                removeBtn: "Xóa đơn này",
                pricePreview: "Tạm tính (Đã bao gồm 10% VAT): "
            },
            en: {
                mainTitle: "WIFI Rental Registration - HIS",
                reqTitle: "Request",
                userName: "User Name",
                imei: "IMEI (Leave blank to auto-fill)",
                fromDate: "From Date",
                toDate: "To Date",
                days: "Days",
                country: "Country",
                package: "Data Package",
                selectCountry: "-- Select Country --",
                selectPackage: "-- Select Package --",
                removeBtn: "Remove this request",
                pricePreview: "Est. Total (Inc. 10% VAT): "
            }
        };

        // Format tiền tệ
        function formatMoney(amount) {
            return new Intl.NumberFormat('vi-VN', { style: 'currency', currency: 'VND' }).format(amount);
        }

        // TÍNH TOÁN GIÁ DỰ KIẾN (CHO HIS - KHÔNG GIẢM GIÁ, CHỈ CỘNG VAT)
        function updatePricePreview(reqElement) {
            const country = reqElement.querySelector('.choices-country').value;
            const pkg = reqElement.querySelector('.package-select').value;
            const daysInput = reqElement.querySelector('.days-input').value;
            const days = parseInt(daysInput) || 0;
            const previewBox = reqElement.querySelector('.price-preview-box');
            const amountSpan = reqElement.querySelector('.price-amount');
            const t = translations[currentLang];

            // Nếu điền chưa đủ thông tin thì ẩn ô giá
            if (!country || !pkg || days <= 0) {
                previewBox.classList.remove('active');
                return;
            }

            // Gọi hàm getPriceForUnit từ file price-table.js
            let unitPrice = 0;
            if (typeof getPriceForUnit === 'function') {
                unitPrice = getPriceForUnit(UNIT_NAME, country, pkg);
            }

            if (unitPrice > 0) {
                // LOGIC CHUẨN CỦA HIS
                const dataTotal = unitPrice * days;
                // HIS không có 15% giảm giá và không có 100k bảo hiểm mặc định
                const vat = Math.round(dataTotal * 0.10);
                const grandTotal = dataTotal + vat;

                amountSpan.textContent = formatMoney(grandTotal);
                previewBox.querySelector('.preview-label').textContent = t.pricePreview;
                previewBox.classList.add('active');
            } else {
                previewBox.classList.remove('active');
            }
        }

        // HÀM TẠO 1 FORM ĐƠN THUÊ MỚI
        function addRentalRequest() {
            requestCount++;
            const t = translations[currentLang];
            const container = document.getElementById('rental-requests-container');
            const div = document.createElement('div');
            div.className = 'rental-request';
            
            // Render HTML cho form
            div.innerHTML = `
                <div class="request-header">
                    <h2 class="request-title" data-trans="reqTitle">${t.reqTitle} ${requestCount}</h2>
                    ${requestCount > 1 ? `<button type="button" class="remove-request-btn" onclick="this.closest('.rental-request').remove(); updateRequestNumbers();" data-trans="removeBtn">${t.removeBtn}</button>` : ''}
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="form-group"><label data-trans="userName">${t.userName}</label><input type="text" class="user-name-input" required></div>
                    <div class="form-group"><label data-trans="imei">${t.imei}</label><input type="text" class="imei-input"></div>
                    <div class="form-group"><label data-trans="fromDate">${t.fromDate}</label><input type="date" class="date-from" required></div>
                    <div class="form-group"><label data-trans="toDate">${t.toDate}</label><input type="date" class="date-to" required></div>
                    <div class="form-group"><label data-trans="days">${t.days}</label><input type="number" class="days-input" readonly></div>
                    <div class="form-group">
                        <label data-trans="country">${t.country}</label>
                        <select class="choices-country" required>
                            <option value="">${t.selectCountry}</option>
                        </select>
                    </div>
                    <div class="md:col-span-2 form-group">
                        <label data-trans="package">${t.package}</label>
                        <select class="package-select" required>
                            <option value="">${t.selectPackage}</option>
                            <option value="500MB/ngày">500MB/ngày</option>
                            <option value="1GB/ngày">1GB/ngày</option>
                            <option value="5GB/ngày">5GB/ngày</option>
                        </select>
                    </div>
                </div>
                <div class="price-preview-box">
                    <span class="preview-label">${t.pricePreview}</span>
                    <span class="price-amount">0 đ</span>
                </div>
            `;
            
            container.appendChild(div);

            // Xử lý sự kiện thay đổi Ngày
            const dateFrom = div.querySelector('.date-from');
            const dateTo = div.querySelector('.date-to');
            const checkDates = () => {
                if(dateFrom.value && dateTo.value) {
                    const d1 = new Date(dateFrom.value);
                    const d2 = new Date(dateTo.value);
                    if(d1 <= d2) {
                        const diffTime = Math.abs(d2 - d1);
                        const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24)) + 1;
                        div.querySelector('.days-input').value = diffDays;
                        updatePricePreview(div); // Cập nhật lại giá
                    }
                }
            };
            dateFrom.addEventListener('change', checkDates);
            dateTo.addEventListener('change', checkDates);

            // Nạp danh sách quốc gia từ bảng giá
            loadCountriesIntoSelect(div.querySelector('.choices-country'));

            // Xử lý sự kiện thay đổi Quốc Gia hoặc Gói -> Cập nhật giá
            div.querySelector('.choices-country').addEventListener('change', () => updatePricePreview(div));
            div.querySelector('.package-select').addEventListener('change', () => updatePricePreview(div));
        }

        // Đánh số thứ tự lại khi xóa đơn
        function updateRequestNumbers() {
            const reqs = document.querySelectorAll('.rental-request');
            const t = translations[currentLang];
            reqs.forEach((r, idx) => {
                r.querySelector('.request-title').textContent = `${t.reqTitle} ${idx + 1}`;
            });
            requestCount = reqs.length;
        }

        // Lấy danh sách quốc gia từ price-table.js
        function loadCountriesIntoSelect(selectElem) {
            // Chờ 1 chút để đảm bảo file price-table.js đã được tải xong
            if (typeof PRICE_TABLE === 'undefined' || typeof PRICE_TABLE[UNIT_NAME] === 'undefined') {
                setTimeout(() => loadCountriesIntoSelect(selectElem), 100);
                return;
            }
            
            const countries = Object.keys(PRICE_TABLE[UNIT_NAME]).sort();
            countries.forEach(country => {
                const opt = document.createElement('option');
                opt.value = country;
                opt.textContent = country;
                selectElem.appendChild(opt);
            });
            
            // Kích hoạt thư viện Choices.js cho đẹp
            new Choices(selectElem, { searchEnabled: true, shouldSort: false, itemSelectText: 'Chọn' });
        }

        // ===== KHỞI TẠO BAN ĐẦU =====
        document.addEventListener('DOMContentLoaded', () => {
            // Nút bấm ngôn ngữ
            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    currentLang = e.target.getAttribute('data-lang');
                    document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
                    e.target.classList.add('active');
                });
            });

            // Nút thêm đơn
            document.getElementById('add-request-btn').addEventListener('click', addRentalRequest);
            
            // Tạo sẵn 1 đơn đầu tiên
            addRentalRequest();

            // Nút GỬI FORM
            document.getElementById('wifi-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                
                // Thu thập dữ liệu người gửi
                const senderInfo = {
                    name: document.getElementById('sender-name').value,
                    email: document.getElementById('sender-email').value,
                    phone: document.getElementById('sender-phone').value,
                    company: document.getElementById('sender-company').value,
                    region: document.getElementById('sender-region').value,
                    taxCode: document.getElementById('sender-taxcode').value
                };

                // Thu thập dữ liệu các đơn
                const requests = [];
                document.querySelectorAll('.rental-request').forEach(req => {
                    requests.push({
                        userName: req.querySelector('.user-name-input').value,
                        imei: req.querySelector('.imei-input').value,
                        fromDate: req.querySelector('.date-from').value,
                        toDate: req.querySelector('.date-to').value,
                        days: parseInt(req.querySelector('.days-input').value) || 0,
                        country: req.querySelector('.choices-country').value,
                        dataPackage: req.querySelector('.package-select').value,
                        unitPrice: getPriceForUnit(UNIT_NAME, req.querySelector('.choices-country').value, req.querySelector('.package-select').value),
                        insuranceCost: 0 // HIS không có bảo hiểm mặc định
                    });
                });

                // Thu thập thông tin vận chuyển
                const shippingInfo = {
                    recipient: document.getElementById('shipping-name').value,
                    phone: document.getElementById('shipping-phone').value,
                    address: document.getElementById('shipping-address').value,
                    method: document.getElementById('shipping-method').value
                };

                const payload = {
                    unit: UNIT_NAME,
                    submissionTime: new Date().toISOString(),
                    globalSenderInfo: senderInfo,
                    rentalRequests: requests,
                    shippingInfo: shippingInfo
                };

                document.getElementById('loadingOverlay').classList.add('active');

                try {
                    const response = await fetch(APPS_SCRIPT_URL, {
                        method: 'POST',
                        body: JSON.stringify(payload)
                    });
                    const result = await response.json();
                    document.getElementById('loadingOverlay').classList.remove('active');

                    if (result.status === 'OK') {
                        document.getElementById('successScreen').classList.add('active');
                    } else {
                        alert("Lỗi máy chủ: " + result.message);
                    }
                } catch (error) {
                    document.getElementById('loadingOverlay').classList.remove('active');
                    alert("Lỗi kết nối mạng: " + error.message);
                }
            });
        });
    </script>
</body>
</html>
